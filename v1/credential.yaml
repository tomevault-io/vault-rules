# TomeVault vault-rules v1 — credential
# AST10 mapping: AST-06
# Exported from scripts/security_scan.py on 2026-04-24

category: credential
ast10: ['AST-06']
rules:
  - id: anthropic_api_key
    severity: critical
    pattern: "sk-ant-[a-zA-Z0-9_-]{20,}"
  - id: openai_api_key
    severity: critical
    pattern: "sk-(?:proj-)?[a-zA-Z0-9]{20,}"
  - id: github_token
    severity: critical
    pattern: "gh[pousr]_[a-zA-Z0-9]{36,}"
  - id: aws_access_key
    severity: critical
    pattern: "AKIA[0-9A-Z]{16}"
  - id: aws_secret_key
    severity: critical
    pattern: "(?:aws_secret_access_key|secret_key)\\s*[=:]\\s*[A-Za-z0-9/+=]{40}"
  - id: stripe_key
    severity: critical
    pattern: "(?:sk|pk)_(?:live|test)_[a-zA-Z0-9]{20,}"
  - id: slack_token
    severity: critical
    pattern: "xox[baprs]-[0-9a-zA-Z-]{10,}"
  - id: google_api_key
    severity: critical
    pattern: "AIza[0-9A-Za-z_-]{35}"
  - id: supabase_key
    severity: critical
    pattern: "eyJ[a-zA-Z0-9_-]{50,}\\.[a-zA-Z0-9_-]{50,}\\.[a-zA-Z0-9_-]{50,}"
  - id: resend_key
    severity: critical
    pattern: "re_[a-zA-Z0-9]{20,}"
  - id: postmark_token
    severity: critical
    pattern: "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
  - id: password_assignment
    severity: high
    pattern: "(?:password|passwd|pwd)\\s*[=:]\\s*[\"\\'][^\"\\']{4,}[\"\\']"
    flags: [IGNORECASE]
  - id: bearer_token
    severity: high
    pattern: "Bearer\\s+[a-zA-Z0-9._-]{20,}"
  - id: private_key_block
    severity: critical
    pattern: "-----BEGIN (?:RSA |EC |DSA )?PRIVATE KEY-----"
  - id: generic_secret
    severity: medium
    pattern: "(?:api_key|apikey|secret|token)\\s*[=:]\\s*[\"\\'][a-zA-Z0-9_-]{16,}[\"\\']"
    flags: [IGNORECASE]
